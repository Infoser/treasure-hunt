
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasure Hunt - Terminal Access</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="container">
        <h1>Login</h1>
        <p style="margin-bottom: 20px; color: #888;">Enter your team credentials to initialize the hunt.</p>
        
        <form id="loginForm">
            <input type="text" id="teamName" placeholder="Team ID" autocomplete="off" required>
            <input type="password" id="teamPassword" placeholder="password" required>
            
            <button type="submit">Continue</button>
            
            <p id="loginError" class="error"></p> 
        </form>
    </div>

    <script type="module" src="js/firebase.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/login.js" defer></script>

</body>
</html>
